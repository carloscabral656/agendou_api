services:
  postgres:
    container_name: agendou_db
    image: postgres:15
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: agendou_db

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agendou_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: agendou_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:admin123@postgres:5432/agendou_db
      JWT_SECRET_KEY: dev-docker-jwt-secret-at-least-32-chars!!
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: